# The URL the site will be built for
base_url = "https://awesome-source.wiki"
title = "Awesome Source"
description = "A small, opinionated wiki of dev resources, browsable in a terminal-style UI."

output_dir = "deploy"

# The default language; used in feeds and search index
default_language = "en"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false

# Whether to generate feed files for the site
generate_feeds = false

# When set to "true", the generated HTML files are minified.
minify_html = false

# The terminal SPA does its own client-side filtering, so we don't need a Zola
# search index.
build_search_index = false

[markdown]
highlighting.theme = "github-dark"

[extra]
author = "Pal Mezei"
github = "https://github.com/sirpalee/awesome-source"
twitter = "https://twitter.com/sirpalee"
language_code = "en-US"
