<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Awesome Source</title>
  <meta name="description" content="A small, opinionated wiki of dev resources, browsable in a terminal-style UI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0e0f10; }
    #root { width: 100vw; height: 100vh; position: relative; }
    /* Faint terminal prompt while React bootstraps from the CDN. */
    #root:empty::before {
      content: "$ loading awesome-source...";
      position: absolute; top: 24px; left: 36px;
      color: #7ec07a; font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
    }
  </style>

  <script src="data.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="terminal-app.js"></script>
  <script>
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(TerminalApp));
  </script>
</body>
</html>
