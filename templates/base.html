<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock description %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0e0f10; }
    #root { width: 100vw; height: 100vh; position: relative; }
    /* Initial flash of unstyled content protection — show a faint terminal
       prompt while React bootstraps from CDN. */
    #root:empty::before {
      content: "$ loading awesome-source...";
      position: absolute; top: 24px; left: 36px;
      color: #7ec07a; font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
    }
  </style>

  <script>
    {# Emit all categories and resources as a single JS object built from the
       Zola section/page tree. Each top-level section under content/ becomes a
       category; resources come from each section/page's [[extra.resources]]
       frontmatter. #}
    {%- set home = get_section(path="_index.md") -%}
    window.AWESOME_DATA = {
      categories: [
        {%- for sub_path in home.subsections -%}
          {%- set sub = get_section(path=sub_path) -%}
          {%- set cat_id = sub.components | last -%}
          { id: {{ cat_id | json_encode | safe }}, name: {{ sub.title | json_encode | safe }}, blurb: {{ sub.description | default(value="") | json_encode | safe }} }{% if not loop.last %},{% endif %}
        {%- endfor -%}
      ],
      resources: [
        {%- set_global is_first_resource = true -%}
        {%- for sub_path in home.subsections -%}
          {%- set sub = get_section(path=sub_path) -%}
          {%- set cat_id = sub.components | last -%}
          {%- if sub.extra.resources -%}
            {%- for r in sub.extra.resources -%}
              {%- if not is_first_resource %},{% endif -%}
              {%- set_global is_first_resource = false -%}
              { id: {{ ["r", cat_id, "s", loop.index] | join(sep="-") | json_encode | safe }}, cat: {{ cat_id | json_encode | safe }}, title: {{ r.title | json_encode | safe }}, url: {{ r.url | json_encode | safe }}, source: {{ r.source | default(value="") | json_encode | safe }}, year: {{ r.year | default(value=0) }}, tags: {{ r.tags | default(value=[]) | json_encode | safe }}, blurb: {{ r.blurb | default(value="") | json_encode | safe }} }
            {%- endfor -%}
          {%- endif -%}
          {%- for page in sub.pages -%}
            {%- if page.extra.resources -%}
              {%- set page_slug = page.slug -%}
              {%- for r in page.extra.resources -%}
                {%- if not is_first_resource %},{% endif -%}
                {%- set_global is_first_resource = false -%}
                { id: {{ ["r", cat_id, page_slug, loop.index] | join(sep="-") | json_encode | safe }}, cat: {{ cat_id | json_encode | safe }}, title: {{ r.title | json_encode | safe }}, url: {{ r.url | json_encode | safe }}, source: {{ r.source | default(value="") | json_encode | safe }}, year: {{ r.year | default(value=0) }}, tags: {{ r.tags | default(value=[]) | json_encode | safe }}, blurb: {{ r.blurb | default(value="") | json_encode | safe }} }
              {%- endfor -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endfor -%}
      ]
    };
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react" src="{{ get_url(path='terminal-app.js') | safe }}"></script>

  <script type="text/babel" data-presets="react">
    ReactDOM.createRoot(document.getElementById('root')).render(<TerminalApp />);
  </script>
</body>
</html>
